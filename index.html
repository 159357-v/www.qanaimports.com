<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Qana Imports Car</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0b0b0b;
color:#f5f5f5;
font-family:Arial;
}

/* MENU */
.navbar{
background:#000;
padding:15px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background-image:url("img/banner.png");
background-size:cover;
background-position:center 75%;
background-repeat:no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
rgba(0,0,0,0.6),
rgba(0,0,0,0.3),
rgba(0,0,0,0.6)
);
}

.hero-content{
position:relative;
z-index:2;
transform: translateY(-120px);
}

.titulo-empresa{
font-size:70px;
color:#d4af37;
animation:fadeDown 1s;
}

@keyframes fadeDown{
from{opacity:0; transform:translateY(-40px);}
to{opacity:1; transform:translateY(0);}
}

/* BOTÕES */
.btn-qana{
background:#d4af37;
border:none;
color:black;
font-weight:bold;
padding:12px 25px;
margin:5px;
}

/* SEÇÕES */
.section{
padding:60px 15px;
}

/* CARDS */
.card{
background:#151515;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 20px 50px rgba(212,175,55,0.2);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
}

/* MOBILE */
@media(max-width:768px){

.hero{
height:70vh;
background-position:center 85%;
}

.hero-content{
transform: translateY(-50px);
}

.titulo-empresa{
font-size:32px;
}

.btn-qana{
width:100%;
max-width:280px;
}

.card img{
height:220px;
}

}

</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<img src="img/logo.jpeg" height="40">
</div>
</nav>

<section class="hero">
<div class="hero-content">
<h1 class="titulo-empresa">Qana Imports Car</h1>
<a href="https://wa.me/5561992331918" class="btn btn-qana">WhatsApp</a>
</div>
</section>

<section id="veiculos" class="section">
<div class="container">

<h2 class="text-center mb-4" style="color:#d4af37;">Veículos</h2>

<div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
<button class="btn btn-qana" onclick="filtrar('todos')">Todos</button>
<button class="btn btn-qana" onclick="filtrar('carro')">Carros</button>
<button class="btn btn-qana" onclick="filtrar('moto')">Motos</button>
</div>

<div class="row g-4" id="lista-veiculos"></div>

</div>
</section>

<footer class="text-center p-4 bg-black">
Qana Imports Car © 2026
</footer>

<a href="https://wa.me/5561992331918" class="whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</a>

<script>

const veiculos = [

{tipo:"moto", nome:"Honda CB 450 Custom", descricao:"Estilo clássico e confortável.", preco:"Consulte valor", imagem:"catalogo/HondaCB450.jpeg"},

{tipo:"carro", nome:"Puma GTB", descricao:"Esportivo clássico.", preco:"Consulte valor", imagem:"catalogo/puma.jpg"},

{tipo:"carro", nome:"Peugeot 308", descricao:"Hatch premium.", preco:"Consulte valor", imagem:"catalogo/308Griffe.jpeg"},

const lista = document.getElementById("lista-veiculos");

function mostrar(arr){
lista.innerHTML="";
arr.forEach(v=>{
lista.innerHTML+=`
<div class="col-md-4">
<div class="card">
<img src="${v.imagem}">
<div class="card-body">
<h5>${v.nome}</h5>
<p>${v.descricao}</p>
<h4>${v.preco}</h4>
<a href="https://wa.me/5561992331918?text=Tenho interesse no ${v.nome}" class="btn btn-qana">
WhatsApp
</a>
</div>
</div>
</div>`;
});
}

function filtrar(tipo){
if(tipo==="todos") mostrar(veiculos);
else mostrar(veiculos.filter(v=>v.tipo===tipo));
}

filtrar("todos");

</script>

</body>
</html>
